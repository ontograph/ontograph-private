[package]
edition.workspace = true
license.workspace = true
name = "ontocode-memories-write"
version.workspace = true

[lib]
name = "ontocode_memories_write"
path = "src/lib.rs"
doctest = false

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
chrono = { workspace = true }
ontocode-backend-client = { workspace = true }
ontocode-core = { workspace = true }
ontocode-config = { workspace = true }
ontocode-features = { workspace = true }
ontocode-git-utils = { workspace = true }
ontocode-login = { workspace = true }
ontocode-otel = { workspace = true }
ontocode-protocol = { workspace = true }
ontocode-rollout = { workspace = true }
ontocode-rollout-trace = { workspace = true }
ontocode-secrets = { workspace = true }
ontocode-state = { workspace = true }
ontocode-terminal-detection = { workspace = true }
ontocode-utils-absolute-path = { workspace = true }
ontocode-utils-output-truncation = { workspace = true }
ontocode-utils-template = { workspace = true }
futures = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["fs", "rt", "sync", "time"] }
tracing = { workspace = true, features = ["log"] }
uuid = { workspace = true, features = ["v4", "v5"] }

[dev-dependencies]
ontocode-models-manager = { workspace = true }
core_test_support = { workspace = true }
pretty_assertions = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["fs", "macros"] }
wiremock = { workspace = true }
