[package]
edition.workspace = true
license.workspace = true
name = "ontocode-thread-store"
version.workspace = true

[lib]
name = "ontocode_thread_store"
path = "src/lib.rs"
doctest = false

[lints]
workspace = true

[dependencies]
async-trait = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
ontocode-git-utils = { workspace = true }
ontocode-install-context = { workspace = true }
ontocode-protocol = { workspace = true }
ontocode-rollout = { workspace = true }
ontocode-state = { workspace = true }
ontocode-utils-path = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
pretty_assertions = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
uuid = { workspace = true }
