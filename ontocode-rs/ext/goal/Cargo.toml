[package]
edition.workspace = true
license.workspace = true
name = "ontocode-goal-extension"
version.workspace = true

[lib]
name = "ontocode_goal_extension"
path = "src/lib.rs"
test = false
doctest = false

[lints]
workspace = true

[dependencies]
async-trait = { workspace = true }
ontocode-core = { workspace = true }
ontocode-extension-api = { workspace = true }
ontocode-otel = { workspace = true }
ontocode-protocol = { workspace = true }
ontocode-state = { workspace = true }
ontocode-tools = { workspace = true }
ontocode-utils-template = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["sync"] }
tracing = { workspace = true }

[dev-dependencies]
anyhow = { workspace = true }
chrono = { workspace = true }
pretty_assertions = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
