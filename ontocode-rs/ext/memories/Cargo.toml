[package]
edition.workspace = true
license.workspace = true
name = "ontocode-memories-extension"
version.workspace = true

[lib]
name = "ontocode_memories_extension"
path = "src/lib.rs"
doctest = false

[lints]
workspace = true

[dependencies]
async-trait = { workspace = true }
ontocode-core = { workspace = true }
ontocode-extension-api = { workspace = true }
ontocode-features = { workspace = true }
ontocode-otel = { workspace = true }
ontocode-tools = { workspace = true }
ontocode-utils-absolute-path = { workspace = true }
ontocode-utils-output-truncation = { workspace = true }
ontocode-utils-template = { workspace = true }
schemars = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["fs"] }

[dev-dependencies]
pretty_assertions = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["fs", "macros"] }
