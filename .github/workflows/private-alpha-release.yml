name: private-alpha-release

on:
  push:
    tags:
      - "rust-v*.*.*"
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version for manual runs, e.g. 0.1.0-alpha.2."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: private-alpha-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux:
    name: Build unsigned Linux binary
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CARGO_BUILD_JOBS: "8"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Cache cargo build inputs
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ontocode-rs/target
          key: private-alpha-linux-${{ runner.os }}-${{ hashFiles('ontocode-rs/Cargo.lock', '.github/workflows/private-alpha-release.yml') }}
          restore-keys: |
            private-alpha-linux-${{ runner.os }}-

      - name: Resolve release version
        id: release_version
        env:
          REQUESTED_RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            version="${GITHUB_REF_NAME#rust-v}"
          elif [ -n "${REQUESTED_RELEASE_VERSION:-}" ]; then
            version="${REQUESTED_RELEASE_VERSION#rust-v}"
            version="${version#v}"
          else
            version="$(sed -n '/^\[workspace.package\]/,/^\[/ s/^version = "\(.*\)"/\1/p' ontocode-rs/Cargo.toml | head -1)"
          fi

          if [ "$version" = "0.0.0" ]; then
            echo "private-alpha-release needs a real release version. Push a rust-v* tag or set workflow_dispatch input release_version." >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Stamp workspace version for release build
        env:
          RELEASE_VERSION: ${{ steps.release_version.outputs.version }}
        run: |
          set -euo pipefail
          sed -i '/^\[workspace.package\]/,/^\[/ s/^version = ".*"$/version = "'"$RELEASE_VERSION"'"/' ontocode-rs/Cargo.toml

      - name: Build ontocode
        working-directory: ontocode-rs
        run: cargo build --release -p ontocode-cli --bin ontocode

      - name: Stage artifact
        env:
          RELEASE_VERSION: ${{ steps.release_version.outputs.version }}
        run: |
          set -euo pipefail
          version="$RELEASE_VERSION"
          mkdir -p dist
          cp ontocode-rs/target/release/ontocode "dist/ontocode-${version}-x86_64-unknown-linux-gnu"
          cp scripts/install/install.sh dist/install-ontocode-linux-x64.sh
          {
            printf '%s\n' '#!/bin/sh'
            printf '%s\n' "export ONTOCODE_RELEASE=\"$version\""
            tail -n +2 scripts/install/install.sh
          } > "dist/install-ontocode-linux-x64-v${version}.sh"
          chmod 0755 dist/install-ontocode-linux-x64.sh "dist/install-ontocode-linux-x64-v${version}.sh"
          (cd dist && sha256sum * > SHA256SUMS)

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: private-alpha-linux
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub prerelease
        if: ${{ github.ref_type == 'tag' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#rust-v}"
          notes_file="release-notes-v${version}.md"
          notes_args=(--notes "Unsigned private-fork alpha build for $version.")
          if [ -f "$notes_file" ]; then
            notes_args=(--notes-file "$notes_file")
          fi
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "$version" \
              "${notes_args[@]}" \
              --prerelease
          fi
