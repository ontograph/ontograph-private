# codegraph architecture policies.
#
# Run via:        codegraph arch-check
# JSON output:    codegraph arch-check --json
# Full reference: codegraph/docs/arch-policies.md (if vendored) or
#                 https://github.com/cognitx-leyton/graphrag-code/blob/main/codegraph/docs/arch-policies.md
#
# Every section is optional — omit to use the shipped defaults.

[meta]
schema_version = 1

# ── Built-in policies ────────────────────────────────────────────────

[policies.import_cycles]
enabled  = true
min_hops = 2
max_hops = 6

[policies.cross_package]
enabled = true
pairs = [
$CROSS_PAIRS_TOML]

[policies.layer_bypass]
enabled           = true
controller_labels = ["Controller"]
repository_suffix = "Repository"
service_suffix    = "Service"
call_depth        = 3

# ── Custom policies (uncomment + edit) ───────────────────────────────
#
# Each custom policy is a raw Cypher query pair: one that counts violations,
# one that returns up to 10 sample rows. The policy fails when the count is
# non-zero.
#
# [[policies.custom]]
# name          = "no_fat_files"
# description   = "Files over 500 LOC"
# count_cypher  = "MATCH (f:File) WHERE f.loc > 500 RETURN count(f) AS v"
# sample_cypher = "MATCH (f:File) WHERE f.loc > 500 RETURN f.path AS file, f.loc AS loc LIMIT 10"
#
# [[policies.custom]]
# name          = "no_dead_endpoints"
# description   = "Endpoints without a HANDLES method"
# count_cypher  = "MATCH (e:Endpoint) WHERE NOT EXISTS { (:Method)-[:HANDLES]->(e) } RETURN count(e) AS v"
# sample_cypher = "MATCH (e:Endpoint) WHERE NOT EXISTS { (:Method)-[:HANDLES]->(e) } RETURN e.path AS route LIMIT 10"
