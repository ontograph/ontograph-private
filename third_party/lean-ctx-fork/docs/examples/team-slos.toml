# Hosted-index SLO gate (GL #391) — drop this file into the team server's
# data dir as `slos.toml` (e.g. ~/.lean-ctx/slos.toml on the host) to arm the
# three GA-gate objectives for the hosted semantic index.
#
# Metrics are fed by the team server's request instrumentation
# (`/v1/metrics` → `slo` block, or `/v1/metrics?format=prometheus`):
#
#   team_query_p95_ms        rolling p95 latency over /v1 routes (ms)
#   team_availability_pct    share of non-5xx responses in the rolling window
#   team_index_lag_seconds   seconds since the last successful index write
#
# Operational runbook: docs/guides/hosted-index-slo.md

[[slo]]
name = "hosted_index_latency"
metric = "team_query_p95_ms"
threshold = 500
direction = "max"
action = "warn"

[[slo]]
name = "hosted_index_availability"
metric = "team_availability_pct"
threshold = 99.5
direction = "min"
action = "warn"

[[slo]]
name = "hosted_index_freshness"
metric = "team_index_lag_seconds"
threshold = 300
direction = "max"
action = "warn"
